                this.scene = new THREE.Scene();
                //this.scene.fog = new THREE.FogExp2(this.fogColor, 0.01);

                this.selectionMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.4,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                    depthTest: true,
                    polygonOffset: true,
                    polygonOffsetFactor: -1,
                    polygonOffsetUnits: -1
                });
                this.selectionMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), this.selectionMaterial);
                this.selectionMesh.visible = false;
                this.selectionMesh.renderOrder = 999;

                this.scene.add(this.selectionMesh);

                this.camera = new THREE.PerspectiveCamera(70, w / h, 0.01, 1000.0);

                this.level = new Level(256, 256, 64);
                this.levelRenderer = new LevelRenderer(this.level, this.scene);
                this.particleEngine = new ParticleEngine(this.level, this.scene, terrain_atlas_texture);
                this.level.particleEngine = this.particleEngine
                this.player = new Player(this.level);

                for (let i = 0; i < 10; i++) {
                    const zombie = new Zombie(this.level, 128, 64, 128, this.scene);
                    zombie.resetPos();
                    this.zombies.push(zombie);
                }

                this.setupControls();

                this.render();
            }

            async saveLevel() {
                try {
                    const blocks = this.level.blocks;

                    const blob = new Blob([blocks]);
                    const compressionStream = blob.stream().pipeThrough(new CompressionStream('gzip'));

                    const compressedBuffer = await new Response(compressionStream).arrayBuffer();

                    const saveBlob = new Blob([compressedBuffer], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(saveBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'level.dat';
                    link.click();

                    URL.revokeObjectURL(url);

                    console.log(`World saved`);
                } catch (error) {
                    console.error("World save error:", error);
                }
            }

            loadLevel() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.dat';
                input.onchange = async e => {
                    try {
                        const file = e.target.files[0];
                        if (!file) return;

                        const decompressionStream = file.stream().pipeThrough(new DecompressionStream('gzip'));
                        const decompressedBuffer = await new Response(decompressionStream).arrayBuffer();
                        const decompressedData = new Uint8Array(decompressedBuffer);

                        if (decompressedData.length !== this.level.blocks.length) {
                            console.error("Incorrect world size");
                            return;
                        }

                        this.level.blocks.set(decompressedData);

                        this.level.calcLightDepths(0, 0, this.level.width, this.level.height);
                        this.levelRenderer.allChanged();

                        console.log(`World loaded`);
                    } catch (error) {
                        console.error("World save error. GZIP only", error);
                    }
                };
                input.click();
            }

            takeScreenshot() {
                const superSamplingFactor = 8;
                const w = this.canvas_renderer.VIRTUAL_WIDTH;
                const h = this.canvas_renderer.VIRTUAL_HEIGHT;
                const screenshotWidth = w * superSamplingFactor;
                const screenshotHeight = h * superSamplingFactor;

                const renderTarget = new THREE.WebGLRenderTarget(screenshotWidth, screenshotHeight, {
                    minFilter: THREE.NearestFilter,
                    format: THREE.RGBAFormat
                });

                this.renderer.setRenderTarget(renderTarget);

                this.renderer.setClearColor(this.fogColor);
                this.renderer.clear();

                this.levelRenderer.render(this.player, 0);
                this.levelRenderer.render(this.player, 1);
                this.particleEngine.render(this.player, this.timer.a);
                this.zombies.forEach(z => z.render(this.timer.a));

                this.renderer.render(this.scene, this.camera);

                this.renderer.setRenderTarget(null);

                const canvas2d = document.createElement('canvas');
                canvas2d.width = screenshotWidth;
                canvas2d.height = screenshotHeight;
                const ctx2d = canvas2d.getContext('2d');

                const buffer = new Uint8Array(screenshotWidth * screenshotHeight * 4);
                this.renderer.readRenderTargetPixels(renderTarget, 0, 0, screenshotWidth, screenshotHeight, buffer);

                const imageData = ctx2d.createImageData(screenshotWidth, screenshotHeight);
                for (let y = 0; y < screenshotHeight; y++) {
                    const srcRow = (screenshotHeight - 1 - y) * screenshotWidth * 4;
                    const destRow = y * screenshotWidth * 4;
                    for (let x = 0; x < screenshotWidth * 4; x++) {
                        imageData.data[destRow + x] = buffer[srcRow + x];
                    }
                }
                ctx2d.putImageData(imageData, 0, 0);

                const dataURL = canvas2d.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `minecraft-screenshot-${Date.now()}.png`;
                link.href = dataURL;
                link.click();

                renderTarget.dispose();
            }

            updateBlockPreview() {
                if (this.lastPaintTexture == this.paintTexture) {
                    const blank = document.createElement('canvas');
                    blank.width = 256;
                    blank.height = 256;

                    if (this.blockPreview != null && this.blockPreview.toDataURL() != blank.toDataURL()) {
                        return;
                    }
                };

                this.blockPreview = this.renderBlockPreview(this.paintTexture);
                this.lastPaintTexture = this.paintTexture;
            }

            renderBlockPreview(blockId, options = {}) {
                const {
                    width = 256,
                    height = 256,
                    zoom = 1.0,
                    direction = { x: 1, y: 1, z: 1 }
                } = options;

                if (!this.renderer || !this.level || !this.level.material) {
                    return null;
                }

                const tile = Tile.tiles[blockId];
                if (!tile) return null;

                const realLevel = this.level;
                const stubLevel = {
                    material: realLevel.material,
                    texture: realLevel.texture,
                    width: 1, height: 1, depth: 1,
                    isSolid: () => false,
                    isLit: () => true,
                    getBrightness: () => 1.0,
                };

                const t = new Tesselator();
                t.init();
                tile.render(t, stubLevel, 0, 0, 0, 0);

                const geometry = t.flush();
                if (!geometry) return null;

                const previewScene = new THREE.Scene();
                const mesh = new THREE.Mesh(geometry, stubLevel.material);
                previewScene.add(mesh);

                const center = new THREE.Vector3(0.5, 0.5, 0.5);
                const dir = new THREE.Vector3(direction.x, direction.y, direction.z).normalize();
                const distance = 10;

                const aspect = width / height;
                const halfExtent = 1.0 / zoom;

                const cam = new THREE.OrthographicCamera(
                    -halfExtent * aspect, halfExtent * aspect,
                    halfExtent, -halfExtent,
                    0.1, 100
                );

                cam.up.set(0, 1, 0);
                cam.position.copy(center).add(dir.clone().multiplyScalar(distance));
                cam.lookAt(center);

                const renderTarget = new THREE.WebGLRenderTarget(width, height, {
                    minFilter: THREE.NearestFilter,
                    magFilter: THREE.NearestFilter,
                    format: THREE.RGBAFormat
                });

                const prevRenderTarget = this.renderer.getRenderTarget();
                const prevClearColor = new THREE.Color();
                this.renderer.getClearColor(prevClearColor);
                const prevClearAlpha = this.renderer.getClearAlpha();

                this.renderer.setRenderTarget(renderTarget);
                this.renderer.setClearColor(0x000000, 0);
                this.renderer.clear();
                this.renderer.render(previewScene, cam);

                this.renderer.setRenderTarget(prevRenderTarget);
                this.renderer.setClearColor(prevClearColor, prevClearAlpha);

                const buffer = new Uint8Array(width * height * 4);
                this.renderer.readRenderTargetPixels(renderTarget, 0, 0, width, height, buffer);

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                const imageData = ctx.createImageData(width, height);

                for (let y = 0; y < height; y++) {
                    const srcRow = (height - 1 - y) * width * 4;
                    const destRow = y * width * 4;
                    for (let i = 0; i < width * 4; i++) {
                        imageData.data[destRow + i] = buffer[srcRow + i];
                    }
                }
                ctx.putImageData(imageData, 0, 0);

                renderTarget.dispose();
                geometry.dispose();

                return canvas;
            }

            pick(distance = 5.0) {
                const start = new THREE.Vector3().copy(this.camera.position);
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion).normalize();

                let x = Math.floor(start.x);
                let y = Math.floor(start.y);
                let z = Math.floor(start.z);

                const stepX = dir.x > 0 ? 1 : -1;
                const stepY = dir.y > 0 ? 1 : -1;
                const stepZ = dir.z > 0 ? 1 : -1;

                const tDeltaX = Math.abs(1 / dir.x);
                const tDeltaY = Math.abs(1 / dir.y);
                const tDeltaZ = Math.abs(1 / dir.z);

                let tMaxX = (dir.x > 0 ? (x + 1 - start.x) : (start.x - x)) * tDeltaX;
                let tMaxY = (dir.y > 0 ? (y + 1 - start.y) : (start.y - y)) * tDeltaY;
                let tMaxZ = (dir.z > 0 ? (z + 1 - start.z) : (start.z - z)) * tDeltaZ;

                let f = -1;
                let dist = 0;

                while (dist < distance) {
                    if (this.level.isSolid(x, y, z)) {
                        return { x: x, y: y, z: z, f: f };
                    }

                    if (tMaxX < tMaxY) {
                        if (tMaxX < tMaxZ) {
                            dist = tMaxX;
                            tMaxX += tDeltaX;
                            x += stepX;
                            f = stepX > 0 ? 4 : 5;
                        } else {
                            dist = tMaxZ;
                            tMaxZ += tDeltaZ;
                            z += stepZ;
                            f = stepZ > 0 ? 2 : 3;
                        }
                    } else {
                        if (tMaxY < tMaxZ) {
                            dist = tMaxY;
                            tMaxY += tDeltaY;
                            y += stepY;
                            f = stepY > 0 ? 0 : 1;
                        } else {
                            dist = tMaxZ;
                            tMaxZ += tDeltaZ;
                            z += stepZ;
                            f = stepZ > 0 ? 2 : 3;
                        }
                    }
                }
                return null;
            }

            setupControls() {
                document.addEventListener('click', () => {
                    document.body.requestPointerLock();
                });

                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        this.player.turn(-e.movementX, e.movementY);
                    }
                });

                window.addEventListener('mousedown', (e) => {
                    if (!document.pointerLockElement) return;

                    const hit = this.pick(5.0);
                    if (!hit) return;

                    if (e.button === 0) {
                        const blockId = this.level.getTile(hit.x, hit.y, hit.z);
                        if (blockId > 0) {
                            this.level.destroyBlock(hit.x, hit.y, hit.z);
                        }
                    }
                    else if (e.button === 2) {
                        let x = hit.x;
                        let y = hit.y;
                        let z = hit.z;

                        if (hit.f === 0) y--;
                        if (hit.f === 1) y++;
                        if (hit.f === 2) z--;
                        if (hit.f === 3) z++;
                        if (hit.f === 4) x--;
                        if (hit.f === 5) x++;

                        const playerAABB = this.player.bb;
                        const tileAABB = new AABB(x, y, z, x + 1, y + 1, z + 1);

                        if (!tileAABB.intersects(playerAABB)) {
                            this.level.setBlock(x, y, z, this.paintTexture);
                        }
                    }
                });

                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Enter') {
                        this.saveLevel();
                    }
                    if (e.code === 'Insert') {
                        this.loadLevel();
                    }
                    if (e.code === 'KeyG') {
                        const zomb = new Zombie(this.level, this.player.x, this.player.y, this.player.z, this.scene);
                        this.zombies.push(zomb);
                    }
                    if (e.code === 'KeyO') {
                        this.takeScreenshot();
                    }
                    if (e.code === 'Digit1' || e.code === 'Numpad1') {
                        this.paintTexture = 2;
                    }
                    if (e.code === 'Digit2' || e.code === 'Numpad2') {
                        this.paintTexture = 3;
                    }
                    if (e.code === 'Digit3' || e.code === 'Numpad3') {
                        this.paintTexture = 4;
                    }
                    if (e.code === 'Digit4' || e.code === 'Numpad4') {
                        this.paintTexture = 5;
                    }
                });

                window.addEventListener('wheel', (event) => {
                    const validTileIds = Object.keys(Tile.tiles)
                        .map(Number)
                        .filter(id => Tile.tiles[id] !== null && id !== 0);

                    if (validTileIds.length === 0) return;

                    let currentIndex = validTileIds.indexOf(this.paintTexture);
                    if (currentIndex === -1) currentIndex = 0;

                    if (event.deltaY > 0) {
                        currentIndex++;
                    } else {
                        currentIndex--;
                    }

                    if (currentIndex >= validTileIds.length) currentIndex = 0;
                    if (currentIndex < 0) currentIndex = validTileIds.length - 1;

                    this.paintTexture = validTileIds[currentIndex];
                }, { passive: true });

                window.addEventListener('contextmenu', e => e.preventDefault());
            }

            tick() {
                this.level.tick();
                this.particleEngine.tick();

                this.zombies.forEach(z => {
                    z.tick();

                    if (z.removed) {
                        this.scene.remove(z.group);
                        this.zombies.splice(this.zombies.indexOf(z), 1);
                    }
                });

                this.player.tick(this.camera);
            }

            render() {
                requestAnimationFrame(() => this.render());

                this.timer.advanceTime();
                for (let i = 0; i < this.timer.ticks; i++) {
                    this.tick();
                }

                this.moveCameraToPlayer();

                const hit = this.pick(5.0);
                if (hit) {
                    this.selectionMesh.visible = true;

                    this.selectionMesh.position.set(hit.x + 0.5, hit.y + 0.5, hit.z + 0.5);
                    this.selectionMesh.rotation.set(0, 0, 0);

                    const offset = 0.5;
                    if (hit.f === 0) { this.selectionMesh.position.y -= offset; this.selectionMesh.rotation.x = Math.PI / 2; }
                    if (hit.f === 1) { this.selectionMesh.position.y += offset; this.selectionMesh.rotation.x = Math.PI / 2; }
                    if (hit.f === 2) { this.selectionMesh.position.z -= offset; }
                    if (hit.f === 3) { this.selectionMesh.position.z += offset; }
                    if (hit.f === 4) { this.selectionMesh.position.x -= offset; this.selectionMesh.rotation.y = Math.PI / 2; }
                    if (hit.f === 5) { this.selectionMesh.position.x += offset; this.selectionMesh.rotation.y = Math.PI / 2; }

                    this.selectionMaterial.opacity = 0.2 + Math.sin(performance.now() * 0.01) * 0.1;
                } else {
                    this.selectionMesh.visible = false;
                }

                this.updateBlockPreview();

                this.levelRenderer.render(this.player, 0);
                this.levelRenderer.render(this.player, 1);

                this.particleEngine.render(this.player, this.timer.a);

                this.zombies.forEach(z => z.render(this.timer.a));

                this.canvas_renderer.render();
            }

            moveCameraToPlayer() {
                this.camera.rotation.set(
                    THREE.MathUtils.degToRad(this.player.xRot),
                    THREE.MathUtils.degToRad(this.player.yRot),
                    0,
                    'YXZ'
                );

                const a = this.timer.a;
                const x = this.player.xo + (this.player.x - this.player.xo) * a;
                const y = this.player.yo + (this.player.y - this.player.yo) * a;
                const z = this.player.zo + (this.player.z - this.player.zo) * a;

                this.camera.position.set(x, y, z);
                this.camera.translateZ(0.3);
            }
        }

        const game = new RubyDung();
        game.init();
    </script>
